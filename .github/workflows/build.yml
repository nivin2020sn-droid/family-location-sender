name: Build Family Location Sender APK

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: family-location-sender

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Bootstrap Gradle wrapper
        run: |
          gradle wrapper --gradle-version 8.7 --distribution-type bin
          chmod +x ./gradlew
          ./gradlew --version | head -5

      - name: Print environment
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          java -version

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace --warning-mode=summary

      - name: Build release APK (signed with debug keystore)
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace --warning-mode=summary

      - name: APK validation (size, ABI, signature, sdk versions)
        if: always()
        run: |
          set -e
          AAPT=$(find $ANDROID_HOME/build-tools/34.0.0 -maxdepth 1 -name 'aapt2' | head -1)
          APKSIGNER=$(find $ANDROID_HOME/build-tools/34.0.0 -maxdepth 1 -name 'apksigner' | head -1)
          echo "AAPT2=$AAPT"
          echo "APKSIGNER=$APKSIGNER"
          for apk in $(find app/build/outputs/apk -name "*.apk"); do
            echo ""
            echo "================================================================"
            echo "  $apk"
            echo "================================================================"
            ls -lh "$apk"
            echo ""
            echo "--- Manifest (package / versionCode / versionName / sdks) ---"
            "$AAPT" dump badging "$apk" 2>/dev/null | head -20 || true
            echo ""
            echo "--- Native ABIs included ---"
            unzip -l "$apk" | grep -E "lib/.*\.so" | awk '{print $4}' | sort -u || echo "(no native libs)"
            echo ""
            echo "--- Signature verification ---"
            "$APKSIGNER" verify --verbose "$apk" 2>&1 | head -20 || echo "(apksigner not available)"
          done

      - name: Stage APKs for upload (renamed for clarity)
        if: always()
        run: |
          mkdir -p staged-apks
          VER=$(grep -E 'versionName *=' app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "$VER" ]; then VER="dev"; fi
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp -v app/build/outputs/apk/release/app-release.apk \
              "staged-apks/FamilyLocationSender-v${VER}-release.apk"
          fi
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            cp -v app/build/outputs/apk/debug/app-debug.apk \
              "staged-apks/FamilyLocationSender-v${VER}-debug.apk"
          fi
          ls -la staged-apks/

      - name: Upload Family-Location-Sender-APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Family-Location-Sender-APK
          path: family-location-sender/staged-apks/*.apk
          if-no-files-found: warn
          retention-days: 30
