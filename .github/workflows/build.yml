name: Build Family Location Sender APK

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    # Android project lives in a sub-folder.
    defaults:
      run:
        working-directory: family-location-sender

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Print environment
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          java -version
          ./gradlew --version | head -10
          echo "--- Project files ---"
          ls -la
          echo "--- Source tree ---"
          find app/src -type d | head -30

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace --warning-mode=summary

      - name: Build release APK (unsigned)
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace --warning-mode=summary
        continue-on-error: true

      - name: List ALL generated APKs
        if: always()
        run: |
          echo "=========== Searching for APKs under app/build/ ==========="
          find app/build -name "*.apk" -type f 2>/dev/null || true
          echo ""
          echo "=========== Contents of app/build/outputs ==========="
          ls -laR app/build/outputs 2>/dev/null || echo "  (no outputs dir)"

      - name: Stage APKs for upload
        if: always()
        run: |
          mkdir -p staged-apks
          if [ -d app/build/outputs/apk ]; then
            find app/build/outputs/apk -name "*.apk" -type f -exec cp -v {} staged-apks/ \;
          fi
          echo "--- Final staged files ---"
          ls -la staged-apks/ || true

      - name: Upload Family-Location-Sender-APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Family-Location-Sender-APK
          path: family-location-sender/staged-apks/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload entire build outputs (for debugging if APK missing)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs-full
          path: family-location-sender/app/build/outputs/
          if-no-files-found: ignore
          retention-days: 14
