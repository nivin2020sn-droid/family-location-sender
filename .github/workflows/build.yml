name: Build Family Location Sender APK

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: family-location-sender

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'
          cache-disabled: true

      - name: Show environment
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          java -version
          gradle --version
          ls -la

      - name: Generate Gradle wrapper
        run: |
          gradle wrapper --gradle-version 8.7 --distribution-type bin
          chmod +x ./gradlew
          ls -la gradlew

      - name: Clean previous outputs
        run: ./gradlew clean --no-daemon

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace --warning-mode=all

      - name: Build release APK (unsigned)
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace --warning-mode=all
        continue-on-error: true

      - name: List ALL build outputs (debug)
        if: always()
        run: |
          echo "=========== Directory tree under app/build/ ==========="
          find app/build -type d 2>/dev/null | head -50
          echo ""
          echo "=========== ALL .apk files in the workspace ==========="
          find . -name "*.apk" -type f 2>/dev/null
          echo ""
          echo "=========== Contents of app/build/outputs (if any) ==========="
          if [ -d app/build/outputs ]; then
            find app/build/outputs -type f 2>/dev/null
          else
            echo "  (app/build/outputs does not exist)"
          fi

      - name: Copy APKs to a flat folder
        if: always()
        run: |
          mkdir -p artifacts
          # Copy every APK we can find under the project to a single folder
          find . -name "*.apk" -type f -exec cp -v {} artifacts/ \; 2>/dev/null || true
          echo ""
          echo "=========== Files staged for upload ==========="
          ls -la artifacts/ || true

      - name: Upload Family-Location-Sender-APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Family-Location-Sender-APK
          path: family-location-sender/artifacts/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload full build/outputs as a backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-build-outputs
          path: family-location-sender/app/build/outputs/
          if-no-files-found: ignore
          retention-days: 14
