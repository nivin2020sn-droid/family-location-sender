name: Build Family Location Sender APK

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    name: Assemble release APK
    runs-on: ubuntu-latest

    # The Android project lives in a sub-folder of the repository.
    defaults:
      run:
        working-directory: family-location-sender

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Generate Gradle wrapper (if missing)
        run: |
          if [ ! -f ./gradlew ]; then
            gradle wrapper --gradle-version 8.7 --distribution-type bin
          fi
          chmod +x ./gradlew

      - name: Build release APK (unsigned)
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Build debug APK (fallback / smoke build)
        if: always()
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: List generated APKs
        if: always()
        run: |
          echo "Release APKs:"
          ls -la app/build/outputs/apk/release/ || true
          echo "Debug APKs:"
          ls -la app/build/outputs/apk/debug/ || true

      - name: Upload Family-Location-Sender-APK
        uses: actions/upload-artifact@v4
        with:
          name: Family-Location-Sender-APK
          path: |
            family-location-sender/app/build/outputs/apk/release/*.apk
            family-location-sender/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
