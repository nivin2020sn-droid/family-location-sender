name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Assemble debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Generate Gradle wrapper (if missing)
        run: |
          if [ ! -f ./gradlew ]; then
            gradle wrapper --gradle-version 8.7 --distribution-type bin
          fi
          chmod +x ./gradlew

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: family-location-sender-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Build release APK (unsigned)
        run: gradle assembleRelease --no-daemon --stacktrace
        continue-on-error: true

      - name: Upload unsigned release APK
        uses: actions/upload-artifact@v4
        with:
          name: family-location-sender-release-unsigned-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30
